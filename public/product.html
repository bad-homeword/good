<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KicksTrend | PRODUCT DETAILS</title>
    <style>
        /* 全域極簡潮流黑白風格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #fafafa;
            color: #111;
            padding-bottom: 80px;
        }

        /* 高級街頭感導覽列 */
        nav {
            background-color: #000;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav .logo {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 25px;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
            letter-spacing: 1px;
        }
        nav .nav-links a:hover {
            color: #fff;
        }

        /* 商品詳情雙欄排版區塊 */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
        }

        /* 左側圖片區（物理大小鎖死，防炸開） */
        .gallery-wrapper {
            flex: 1;
            min-width: 350px;
            background: #fff;
            border: 1px solid #eee;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 450px;
        }
        .main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 右側規格購買區 */
        .details-wrapper {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .brand-tag {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .shoe-title {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #111;
        }
        .shoe-price {
            font-size: 24px;
            font-weight: 800;
            color: #111;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .shoe-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 潮流方塊尺寸選擇器 */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #222;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .size-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .size-box {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            transition: all 0.2s;
        }
        .size-box:hover {
            border-color: #111;
        }
        .size-box.selected {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        /* 數量增減與加入購物車按鈕 */
        .qty-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .qty-select {
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-weight: 600;
            background: #fff;
            outline: none;
            height: 48px;
            width: 70px;
        }
        .add-to-cart-btn {
            flex: 1;
            background: #111;
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            text-align: center;
            height: 48px;
        }
        .add-to-cart-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KicksTrend</a>
        <div class="nav-links">
            <a href="index.html">SHOP 回首頁</a>
            <a href="cart.html">CART 購物車</a>
            <a href="login.html">AUTH 登入/註冊</a>
            <a href="admin.html">DASHBOARD 後台</a>
        </div>
    </nav>

    <div class="container" id="product-detail-container">
        <p style="text-align: center; width: 100%; color: #888;">正在載入潮流單品詳情...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || 1; 
        // 💡 讀取首頁網址傳過來的 size 參數，如果沒有就預設 US 9.0
        let selectedSizeText = urlParams.get('size') || "US 9.0"; 
        
        // 1. 單獨撈取該 ID 商品
        fetch(`/api/products/${productId}`)
            .then(res => res.json())
            .then(product => {
                let imgSrc = product.image || 'images/shoes01.jpg';

                // ==========================================
                // 👟 究極修正：完美支援「尺寸：US 7.5 - US 11。」區間拆解法
                // ==========================================
                let sizeHtml = '';
                const desc = product.description || '';
                
                if (desc.includes('尺寸：')) {
                    let sizeSegment = desc.split('尺寸：')[1].split('。')[0]; 
                    const numbers = sizeSegment.match(/[0-9.]+/g);
                    
                    if (numbers && numbers.length >= 2) {
                        const minSize = parseFloat(numbers[0]); 
                        const maxSize = parseFloat(numbers[1]); 
                        
                        if (!isNaN(minSize) && !isNaN(maxSize) && minSize < maxSize) {
                            let sizesArray = [];
                            for (let size = minSize; size <= maxSize; size += 0.5) {
                                sizesArray.push('US ' + size.toFixed(1));
                            }
                            
                            // 將產出的尺寸陣列轉化為一個一個精美的 HTML 潮流方塊
                            sizeHtml = sizesArray.map(size => {
                                // 判斷這個方塊是不是剛剛從首頁帶過來的尺寸，如果是，直接加黑底白字 class="selected"！
                                const isSelected = size === selectedSizeText ? 'selected' : '';
                                return '<div class="size-box ' + isSelected + '" onclick="selectSize(this)">' + size + '</div>';
                            }).join('');
                        }
                    }
                } 
                
                // 防呆機制的 Fallback 方塊
                if (!sizeHtml) {
                    sizeHtml = '<div class="size-box selected" onclick="selectSize(this)">US 9.0</div>';
                }

                // 將拼好的內容動態塞進詳情頁容器
                document.getElementById('product-detail-container').innerHTML = 
                    '<div class="gallery-wrapper">' +
                        '<img src="' + imgSrc + '" alt="' + product.name + '" class="main-img">' +
                    '</div>' +
                    '<div class="details-wrapper">' +
                        '<div class="brand-tag">LIMITED COLLECTION // 正品保證</div>' +
                        '<h1 class="shoe-title">' + product.name + '</h1>' +
                        '<div class="shoe-price">NT$ ' + Number(product.price).toLocaleString() + '</div>' +
                        '<p class="shoe-desc">' + desc + '</p>' +
                        
                        '<div class="section-label">Select Size (US)</div>' +
                        '<div class="size-grid">' + sizeHtml + '</div>' + 
                        
                        '<div class="qty-wrapper">' +
                            '<div style="display: flex; flex-direction: column;">' +
                                '<div class="section-label" style="margin-bottom:5px;">QTY</div>' +
                                '<select id="shoe-qty" class="qty-select">' +
                                    '<option value="1">1</option>' +
                                    '<option value="2">2</option>' +
                                    '<option value="3">3</option>' +
                                    '<option value="4">4</option>' +
                                    '<option value="5">5</option>' +
                                '</select>' +
                            '</div>' +
                            '<div style="flex:1; display:flex; flex-direction:column; justify-content:flex-end; height:68px;">' +
                                '<button class="add-to-cart-btn" onclick="addToCart(' + JSON.stringify(product).replace(/"/g, '&quot;') + ')">Add To Cart / 加入購物車</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
            })
            .catch(err => {
                console.error("無法撈取商品詳情：", err);
                document.getElementById('product-detail-container').innerHTML = '<p style="color:red; text-align:center; width:100%;">商品資料撈取失敗，請確認後端正在運作。</p>';
            });

        // 尺寸方塊選取切換
        function selectSize(element) {
            const boxes = document.querySelectorAll('.size-box');
            boxes.forEach(box => box.classList.remove('selected'));
            element.classList.add('selected');
            selectedSizeText = element.innerText; // 更新當下選取的尺寸文字
        }

        // 加入購物車
        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const qty = parseInt(document.getElementById('shoe-qty').value) || 1;

            // 檢查購物車中是否已有同ID且同尺寸的商品
            const existing = cart.find(item => item.id === product.id && item.size === selectedSizeText);
            
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({ 
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    size: selectedSizeText, // 寫入選中的尺寸
                    quantity: qty 
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('⚡ SUCCESS / 已成功加入購物車！\n單品：' + product.name + '\n規格：' + selectedSizeText + ' | 數量：' + qty + ' 雙');
        }
    </script>
</body>
</html>

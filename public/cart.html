<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KicksTrend | CART 購物車</title>
    <style>
        /* 全域極簡潮流黑白風格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #fafafa;
            color: #111;
            padding-bottom: 80px;
        }

        /* 高級街頭感導覽列 */
        nav {
            background-color: #000;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav .logo {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 25px;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
            letter-spacing: 1px;
        }
        nav .nav-links a:hover {
            color: #fff;
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #111;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .clear-cart-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.3s;
        }
        .clear-cart-btn:hover {
            color: #ff3333;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 20px 25px;
            border: 1px solid #eee;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .item-details h3 {
            font-size: 16px;
            font-weight: 700;
            color: #111;
            margin-bottom: 5px;
        }
        .item-details p {
            color: #666;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        .item-price {
            font-size: 16px;
            font-weight: 800;
            color: #111;
        }

        .empty-msg {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 15px;
            background: #fff;
            border: 1px dashed #ccc;
        }

        .summary-box {
            background: #fff;
            border: 1px solid #111;
            padding: 30px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-wrapper {
            text-align: left;
        }
        .total-wrapper label {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            display: block;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .total-amount {
            font-size: 24px;
            font-weight: 900;
            color: #111;
        }
        .checkout-btn {
            background: #111;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        .checkout-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KicksTrend</a>
        <div class="nav-links">
            <a href="index.html">SHOP 繼續購物</a>
            <a href="cart.html">CART 購物車</a>
            <a href="login.html">AUTH 登入/註冊</a>
            <a href="admin.html">DASHBOARD 後台</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Your Cart</h1>
            <button class="clear-cart-btn" onclick="clearCart()">Clear All / 清空購物車</button>
        </div>

        <div id="cart-items"></div>

        <div class="summary-box">
            <div class="total-wrapper">
                <label>Total Amount</label>
                <div class="total-amount">NT$ <span id="total-price">0</span></div>
            </div>
            <button class="checkout-btn" onclick="checkout()">Submit Order / 送出訂單</button>
        </div>
    </div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-items');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-msg">🤖 您的購物車目前是空的，快去首頁挑選限量神鞋吧！</div>';
                document.getElementById('total-price').innerText = '0';
                return;
            }

            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                // 💡 關鍵讀取：完美讀取快取中使用者自選的真實鞋碼！
                const sizeInfo = item.size ? item.size : 'US 9.0';
                
                return '<div class="cart-item-row">' +
                            '<div class="item-details">' +
                                '<h3>' + item.name + '</h3>' +
                                '<p>SIZE: ' + sizeInfo + ' &nbsp;|&nbsp; QTY: ' + item.quantity + '</p>' +
                            '</div>' +
                            '<div class="item-price">NT$ ' + Number(item.price * item.quantity).toLocaleString() + '</div>' +
                        '</div>';
            }).join('');
            
            document.getElementById('total-price').innerText = Number(total).toLocaleString();
        }

        function checkout() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) return alert('購物車內無商品');

            const totalText = document.getElementById('total-price').innerText.replace(/,/g, '');
            const username = localStorage.getItem('username') || '訪客鞋頭';

            fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, total: totalText, items: cart })
            })
            .then(res => res.json())
            .then(data => {
                alert('🎉 訂單送出成功！\n訂單編號: ' + data.orderId + '\n感謝您在 KicksTrend 購物！');
                localStorage.removeItem('cart');
                window.location.href = 'index.html';
            })
            .catch(err => {
                console.error("建立訂單失敗：", err);
                alert('訂單送出失敗，請確認後端 server.js 運作正常！');
            });
        }

        function clearCart() {
            if (confirm('確定要清空購物車內所有商品嗎？')) {
                localStorage.removeItem('cart');
                renderCart();
            }
        }

        renderCart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KicksTrend | 潮流球鞋選品店</title>
    <style>
        /* ==========================================
           全域極簡潮流街頭風設計 (CSS)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #fafafa;
            color: #111;
            padding-bottom: 80px;
        }

        /* 高級全黑導覽列 */
        nav {
            background-color: #000;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav .logo {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 25px;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s;
            letter-spacing: 1px;
        }
        nav .nav-links a:hover {
            color: #fff;
        }

        /* 頂部高級宣傳橫幅 */
        .hero-section {
            text-align: center;
            padding: 60px 20px 40px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .hero-section h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
            color: #111;
        }
        .hero-section p {
            color: #666;
            font-size: 13px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* 商品大網格容器 */
        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center; 
        }

        /* 客服專屬動畫與動態優化 */
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        #chat-logs::-webkit-scrollbar { width: 4px; }
        #chat-logs::-webkit-scrollbar-thumb { background: #111; }
        @media (max-width: 600px) {
            nav {
                flex-direction: column; /* 改為垂直排列 */
                padding: 15px !important;
            }
            nav .nav-links {
                margin-top: 10px;
                display: flex;
                gap: 10px; /* 縮小連結間距，防止換行跑版 */
            }
            nav .nav-links a {
                margin-left: 0 !important; /* 移除原本的左邊距 */
                font-size: 12px; /* 稍微縮小字體以適應窄螢幕 */
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KicksTrend</a>
        <div class="nav-links">
            <a href="index.html">SHOP 首頁</a>
            <a href="cart.html">CART 購物車</a>
            <a href="login.html">AUTH 登入/註冊</a>
            <a href="admin.html">DASHBOARD後台</a>
        </div>
    </nav>

    <div class="hero-section">
        <h1>Limited Sneakers</h1>
        <p>— 100% 正品，限量潮鞋選品店 —</p>
    </div>

    <div class="container">
        <div id="product-list"></div>
    </div>

    <div id="ai-chat-bubble" onclick="toggleChatWindow()" style="position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #111; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999; transition: all 0.3s ease; user-select: none;">
        👟
    </div>

    <div id="ai-chat-window" style="position: fixed; bottom: 90px; right: 20px; width: 340px; height: 450px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 2px solid #111; box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; z-index: 9999; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);">
        
        <div style="background: #111; color: #fff; padding: 16px 20px; font-weight: 900; font-size: 11px; letter-spacing: 1.5px; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="animation: pulse 1.5s infinite; color: #00ff00;">●</span> KICKSTREND AI ASSISTANT
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button id="resize-btn" onclick="toggleResize()" style="background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 14px; transition: color 0.2s;" title="放大/縮小">⛶</button>
                <button onclick="toggleChatWindow()" style="background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; font-size: 16px; transition: color 0.2s;" title="關閉">✕</button>
            </div>
        </div>
        
        <div id="chat-logs" style="flex: 1; overflow-y: auto; padding: 20px; font-size: 13px; background: #fafafa; line-height: 1.6; display: flex; flex-direction: column; gap: 12px;">
            <div style="margin: 0; color: #111; display: flex; gap: 8px; align-items: flex-start;">
                <span style="background: #111; color: #fff; padding: 4px 6px; font-size: 10px; font-weight: 900; letter-spacing: 0.5px;">STAFF</span>
                <div style="background: #fff; border: 1px solid #111; padding: 10px 14px; max-width: 80%; box-shadow: 2px 2px 0px #111;">
                    哈囉！歡迎來到 KicksTrend 選品店。今晚想找哪雙限量鞋款，還是想了解哪款球鞋的版型尺寸？輸入「查訂單」也能直接幫你查詢進度喔！
                </div>
            </div>
        </div>
        
        <div id="chat-input-area" style="display: flex; border-top: 2px solid #111; background: #fff;">
            <input type="text" id="chat-input" placeholder="問問尺寸、配送或輸入「查訂單」..." style="flex: 1; padding: 16px; border: none; outline: none; font-size: 12px; color: #111; font-weight: 500; background: transparent;">
            <button onclick="sendChatMessage()" style="background: #111; color: #fff; border: none; padding: 0 25px; cursor: pointer; font-size: 11px; font-weight: 900; letter-spacing: 1.5px; transition: all 0.2s; border-left: 2px solid #111;">SEND</button>
        </div>
    </div>

    <script>
        // 1. 撈取後端商品資料並精準解鎖尺寸限制
        fetch('/api/products')
            .then(res => res.json())
            .then(products => {
                const list = document.getElementById('product-list');
                let allCardsHtml = []; 
                
                for (let i = 0; i < products.length; i++) {
                    const p = products[i];
                    const fileNumber = String(i + 1).padStart(2, '0'); 
                    
                    let optionsHtml = '';
                    const desc = p.description || '';
                    
                    // 用絕對定位法切開「尺寸：」與「。」之間的區間字串
                    if (desc.includes('尺寸：')) {
                        let sizeString = desc.split('尺寸：')[1].split('。')[0]; 
                        
                        if (sizeString.includes('-')) {
                            let rawParts = sizeString.split('-');
                            let minNum = parseFloat(rawParts[0].replace(/[^\d.]/g, ''));
                            let maxNum = parseFloat(rawParts[1].replace(/[^\d.]/g, ''));
                            
                            if (!isNaN(minNum) && !isNaN(maxNum) && minNum < maxNum) {
                                for (let size = minNum; size <= maxNum; size += 0.5) {
                                    const sizeText = 'US ' + size.toFixed(1);
                                    const isSelected = (size === 9.0 || (9.0 < minNum && size === minNum)) ? 'selected' : '';
                                    optionsHtml += '<option value="' + sizeText + '" ' + isSelected + '>' + sizeText + '</option>';
                                }
                            }
                        }
                    }
                    
                    if (!optionsHtml) {
                        optionsHtml = 
                            '<option value="US 8.0">US 8.0</option>' +
                            '<option value="US 8.5">US 8.5</option>' +
                            '<option value="US 9.0" selected>US 9.0</option>' +
                            '<option value="US 9.5">US 9.5</option>' +
                            '<option value="US 10.0">US 10.0</option>';
                    }

                    // 渲染商品卡片 HTML
                    allCardsHtml.push(
                        '<div style="border: 1px solid #eee; padding: 15px; margin: 15px; width: 240px; display:inline-block; vertical-align: top; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: left; transition: transform 0.3s;">' +
                            '<div style="width: 100%; height: 220px; overflow: hidden; background: #f5f5f5;">' +
                                '<img src="' + p.image + '" alt="' + p.name + '" style="width: 100%; height: 100%; object-fit: cover;">' +
                            '</div>' +
                            '<div style="padding-top: 15px;">' +
                                '<h3 style="font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #111; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4;">' + p.name + '</h3>' +
                                '<div style="font-size: 15px; font-weight: 800; color: #111; margin-bottom: 12px;">NT$ ' + Number(p.price).toLocaleString() + '</div>' +
                                
                                // 專屬尺寸選單
                                '<div style="margin-bottom: 15px;">' +
                                    '<label style="font-size: 10px; font-weight: 700; color: #888; display: block; margin-bottom: 4px; letter-spacing: 0.5px;">SELECT SIZE (US)</label>' +
                                    '<select id="size-' + p.id + '" style="width: 100%; padding: 8px; border: 1px solid #ddd; font-size: 12px; font-weight: 600; background: #fff; outline: none; cursor: pointer; color: #222;">' +
                                        optionsHtml +
                                    '</select>' +
                                '</div>' +
                                
                                // 💡 VIEW DETAILS 綁定：跳轉至詳情頁時傳遞選定的尺寸參數！
                                '<button onclick="goToDetail(' + p.id + ')" style="width: 100%; display: block; border: none; text-align: center; background: #111; color: #fff; padding: 10px; font-size: 12px; font-weight: 600; text-decoration: none; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; margin-bottom: 8px;">VIEW DETAILS</button>' +
                                // ADD TO CART 綁定：抓取選定尺寸寫入快取
                                '<button onclick=\'addToCart(' + JSON.stringify(p).replace(/"/g, '&quot;') + ')\' style="width: 100%; display: block; border: 1px solid #111; text-align: center; background: #fff; color: #111; padding: 9px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;">ADD TO CART</button>' +
                            '</div>' +
                        '</div>'
                    );
                }
                
                list.innerHTML = allCardsHtml.join('');
            })
            .catch(err => {
                console.error("載入失敗：", err);
                document.getElementById('product-list').innerHTML = '<p style="color:red; padding:20px;">伺服器連線失敗，請檢查後端狀態。</p>';
            });

        // 核心跳轉函數：動態抓取當下選取的尺寸，當成網址參數送給詳情頁！
        function goToDetail(productId) {
            const selectEl = document.getElementById('size-' + productId);
            const selectedSize = selectEl ? selectEl.value : 'US 9.0';
            window.location.href = 'product.html?id=' + productId + '&size=' + encodeURIComponent(selectedSize);
        }

        // 核心加購函數：精準抓取使用者點擊時選定的尺寸，寫入 LocalStorage 快取！
        function addToCart(product) {

    // ===== 檢查登入狀態 =====
    const username = localStorage.getItem('username');

    if (!username) {
        alert('🔒 請先登入會員再加入購物車');

        if (confirm('是否前往登入頁面？')) {
            window.location.href = 'login.html';
        }

        return;
    }

    // ===== 已登入才允許加入 =====
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    const selectEl = document.getElementById('size-' + product.id);
    const chosenSize = selectEl ? selectEl.value : 'US 9.0';

    const existing = cart.find(
        item => item.id === product.id &&
        item.size === chosenSize
    );

    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            size: chosenSize,
            quantity: 1
        });
    }

    localStorage.setItem('cart', JSON.stringify(cart));

    alert(
        '⚡ SUCCESS / 已成功加入購物車！\n' +
        '單品：' + product.name +
        '\n規格：' + chosenSize
    );
}

        // 2. AI 客服訊息發送（💡 已改為相對路徑 /api/chat，完美相容外網 ngrok 通信）
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const logs = document.getElementById('chat-logs');
            const msg = input.value.trim();
            if(!msg) return;

            logs.innerHTML += 
                '<div style="align-self: flex-end; max-width: 80%; text-align: right; margin-left: auto;">' +
                    '<div style="background: #fff; border: 1px solid #111; padding: 10px 14px; display: inline-block; text-align: left; color: #111; font-weight: 600; box-shadow: -2px 2px 0px #111;">' + 
                        msg + 
                    '</div>' +
                '</div>';
                
            input.value = '';
            logs.scrollTop = logs.scrollHeight;

            const currentUsername = localStorage.getItem('username') || '訪客';

            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, username: currentUsername })
            })
            .then(res => res.json())
            .then(data => {
                logs.innerHTML += 
                    '<div style="margin: 5px 0; display: flex; gap: 8px; align-items: flex-start;">' +
                        '<span style="background: #111; color: #fff; padding: 4px 6px; font-size: 10px; font-weight: 900; letter-spacing: 0.5px;">STAFF</span>' +
                        '<div style="background: #fff; border: 1px solid #111; padding: 10px 14px; max-width: 80%; box-shadow: 2px 2px 0px #111; font-weight: 500;">' + 
                            data.reply + 
                        '</div>' +
                    '</div>';
                logs.scrollTop = logs.scrollHeight;
            })
            .catch(err => {
                logs.innerHTML += '<div style="margin: 5px 0; color: #ff3333; font-size:11px; font-weight:700;">⚠️ 系統連線失敗，請確認 ai_server.py 後端是否有啟動。</div>';
                logs.scrollTop = logs.scrollHeight;
            });
        }

        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });

        // 3. AI 客服視窗切換
        let isChatOpen = false;
        function toggleChatWindow() {
            const chatWindow = document.getElementById('ai-chat-window');
            const chatBubble = document.getElementById('ai-chat-bubble');
            
            if (!isChatOpen) {
                chatWindow.style.display = "flex";
                chatBubble.innerHTML = "✕"; 
                isChatOpen = true;
            } else {
                chatWindow.style.display = "none";
                chatBubble.innerHTML = "👟"; 
                isChatOpen = false;
            }
        }

        let isExpanded = false;
        function toggleResize() {
            const chatWindow = document.getElementById('ai-chat-window');
            const resizeBtn = document.getElementById('resize-btn');
            
            if (!isExpanded) {
                chatWindow.style.width = "520px";
                chatWindow.style.height = "550px";
                resizeBtn.innerText = "內";
                isExpanded = true;
            } else {
                chatWindow.style.width = "340px";
                chatWindow.style.height = "450px";
                resizeBtn.innerText = "⛶";
                isExpanded = false;
            }
            const logs = document.getElementById('chat-logs');
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KicksTrend | 管理後台 (Admin Dashboard)</title>
    <style>
        /* 全域極簡潮流黑白風格，對齊前台視覺 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #fafafa;
            color: #111;
            padding-bottom: 60px;
            display: none; /* 初始隱藏，驗證通過後才顯示，防止畫面閃爍 */
        }

        /* 高級街頭感導覽列 */
        nav {
            background-color: #000;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        nav .logo {
            color: #fff;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav .nav-links a, nav .nav-links button {
            color: #aaa;
            text-decoration: none;
            margin-left: 25px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
        }
        nav .nav-links a:hover, nav .nav-links button:hover {
            color: #fff;
        }

        /* 主體容器佈局 */
        .dashboard-container {
            max-width: 1250px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }
        @media (max-width: 900px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        h1.page-title {
            grid-column: 1 / -1;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #111;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        /* 板塊樣式卡片 */
        .section-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 30px;
            border-radius: 0px; /* 街頭俐落感，不使用圓角 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .section-card h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            padding-left: 12px;
        }
        .section-card h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            bottom: 2px;
            width: 4px;
            background-color: #000;
        }

        /* 表單美化 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            color: #666;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            background-color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #000;
            outline: none;
        }

        /* 潮流感按鈕 */
        .btn-black {
            background-color: #000;
            color: #fff;
            padding: 12px 24px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-black:hover {
            background-color: #333;
        }
        .btn-secondary {
            background-color: #fff;
            color: #111;
            border: 1px solid #111;
            padding: 11px 24px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: #111;
            color: #fff;
        }

        /* 商品列表與表格美化 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .data-table th {
            background-color: #f5f5f5;
            text-align: left;
            padding: 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid #111;
        }
        .data-table td {
            padding: 14px;
            font-size: 13px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .product-img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            background-color: #eee;
        }

        /* 表格內小按鈕 */
        .btn-sm-edit {
            background: none;
            border: 1px solid #000;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.2s ease;
        }
        .btn-sm-edit:hover {
            background-color: #000;
            color: #fff;
        }
        .btn-sm-delete {
            background: none;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-sm-delete:hover {
            background-color: #ff4d4d;
            color: #fff;
        }

        /* 訂單狀態標籤（黑白潮流風格） */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pending { background-color: #e5e5e5; color: #111; }
        .status-shipping { background-color: #111; color: #fff; }
    </style>

    <script>
        // 🔒 前端高強度防護網：在頁面加載前，立即驗證管理員身分
        const token = localStorage.getItem('token');
        
        // 解析 JWT 檢查身份的輔助函式
        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        const userPayload = token ? parseJwt(token) : null;

        // 如果沒有 Token，或解析出的 role 不是 admin，直接阻斷並踢回登入頁
        if (!token || !userPayload || userPayload.role !== 'admin') {
            alert('⚠️ 偵測到未授權存取！本區塊僅限【KicksTrend 系統管理員】進入。');
            window.location.href = 'login.html';
        } else {
            // 驗證成功後，才允許顯示 HTML 結構
            document.addEventListener("DOMContentLoaded", function() {
                document.body.style.display = "block";
            });
        }
    </script>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">KicksTrend // Admin</a>
        <div class="nav-links">
            <a href="index.html">前台首頁</a>
            <button onclick="logout()">安全登出</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1 class="page-title">數據控制大盤 // Dashboard</h1>

        <div class="section-card">
            <h2 id="form-title">管理 // 新增與編輯商品</h2>
            <input type="hidden" id="p-id">
            
            <div class="form-group">
                <label>商品名稱</label>
                <input type="text" id="p-name" class="form-control" placeholder="例如：Aimé Leon Dore × NB 993">
            </div>
            
            <div class="form-group">
                <label>商品價格 (NT$)</label>
                <input type="number" id="p-id" id="p-price" class="form-control" placeholder="14500">
            </div>
            
            <div class="form-group">
                <label>商品描述與尺寸標註</label>
                <input type="text" id="p-desc" class="form-control" placeholder="輸入商品特色、風格與尺寸範圍...">
            </div>
            
            <div class="form-group">
                <label>商品圖片路徑 (Image URL)</label>
                <input type="text" id="p-img" class="form-control" value="images/shoes1.jpg">
            </div>

            <button onclick="saveProduct()" class="btn-black">儲存商品資料</button>
            <button onclick="clearForm()" class="btn-secondary">清空欄位</button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 40px;">
            
            <div class="section-card">
                <h2>庫存商品清單 // Products</h2>
                <div id="admin-product-list" style="overflow-x: auto;">
                    </div>
            </div>

            <div class="section-card">
                <h2>最新訂單追蹤 // Orders</h2>
                <div id="admin-order-list" style="overflow-x: auto;">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // 撈取後台所有資料 (商品 + 訂單)
        function loadAdminData() {
            // A. 撈取商品資料
            fetch('/api/products')
                .then(res => res.json())
                .then(products => {
                    const listContainer = document.getElementById('admin-product-list');
                    if(products.length === 0) {
                        listContainer.innerHTML = '<p style="color:#888; font-size:13px;">目前商鋪內無任何商品。</p>';
                        return;
                    }
                    
                    let html = `<table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>預覽</th>
                                            <th>名稱</th>
                                            <th>價格</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;
                    
                    products.forEach(p => {
                        html += `<tr>
                                    <td><img src="${p.image || 'https://images.unsplash.com/photo-1541658016709-82535e94bc69?w=100'}" class="product-img-preview"></td>
                                    <td><strong>${p.name}</strong></td>
                                    <td>NT$ ${Number(p.price).toLocaleString()}</td>
                                    <td>
                                        <button class="btn-sm-edit" onclick='editForm(${JSON.stringify(p)})'>編輯</button>
                                        <button class="btn-sm-delete" onclick="deleteProduct(${p.id})">刪除</button>
                                    </td>
                                 </tr>`;
                    });
                    html += '</tbody></table>';
                    listContainer.innerHTML = html;
                });

            // B. 撈取訂單資料
            fetch('/api/admin/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => {
                if(res.status === 403) return alert('權限不足，無法讀取訂單列表！');
                return res.json();
            })
            .then(orders => {
                const orderContainer = document.getElementById('admin-order-list');
                if(!orders || orders.length === 0) {
                    orderContainer.innerHTML = '<p style="color:#888; font-size:13px;">目前系統中無任何客戶訂單。</p>';
                    return;
                }

                let html = `<table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>買家帳號</th>
                                        <th>總金額</th>
                                        <th>狀態</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                
                orders.forEach(o => {
                    const statusClass = o.status === 'Pending' ? 'status-pending' : 'status-shipping';
                    html += `<tr>
                                <td>#${o.id}</td>
                                <td>${o.username}</td>
                                <td>NT$ ${Number(o.total).toLocaleString()}</td>
                                <td><span class="status-badge ${statusClass}">${o.status}</span></td>
                             </tr>`;
                });
                html += '</tbody></table>';
                orderContainer.innerHTML = html;
            });
        }

        // 新增或更新商品
        function saveProduct() {
            const id = document.getElementById('p-id').value;
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const description = document.getElementById('p-desc').value.trim();
            const image = document.getElementById('p-img').value.trim();

            if (!name || !price) return alert('商品名稱與價格為必填欄位！');

            const payload = { name, price: Number(price), description, image };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/admin/products/${id}` : '/api/admin/products';

            fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            }).then(res => {
                if (res.ok) {
                    alert('數據儲存成功！');
                    clearForm();
                    loadAdminData();
                } else {
                    alert('儲存失敗，請檢查管理員授權狀態。');
                }
            });
        }

        // 刪除商品
        function deleteProduct(id) {
            if(!confirm('🔥 確定要從資料庫永久移除這雙球鞋嗎？此操作無法還原。')) return;
            fetch(`/api/admin/products/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    loadAdminData();
                } else {
                    alert('刪除失敗，請確認管理員權限。');
                }
            });
        }

        // 將選定商品資料填入左側表單以供編輯
        function editForm(p) {
            document.getElementById('form-title').innerText = "管理 // 正在編輯此商品";
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-img').value = p.image || '';
        }

        // 清空表單欄位
        function clearForm() {
            document.getElementById('form-title').innerText = "管理 // 新增與編輯商品";
            document.getElementById('p-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-img').value = 'images/shoes1.jpg';
        }

        // 登出系統
        function logout() {
            if(confirm('確定要安全登出管理嗎？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // 頁面初始化加載
        loadAdminData();
    </script>
</body>
</html>
